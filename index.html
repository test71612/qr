<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<!-- إضافة خط مميز من Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
<style>
    /* خلفية شفافة للـ OBS */
    body {
        margin: 0;
        background: transparent !important; 
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: 'Cairo', sans-serif;
    }

    .view {
        position: absolute;
        transition: opacity 1.5s ease-in-out, transform 1.5s ease;
        opacity: 0;
        pointer-events: none;
    }

    .view.active {
        opacity: 1;
        pointer-events: all;
    }

    /* تحسين الإطار */
    .qr-wrapper {
        background: #ffffff;
        border: 4px solid #430929;
        padding: 20px; 
        border-radius: 25px;
        box-shadow: 0 0 25px rgba(242, 103, 53, 0.4);
        display: inline-block;
        position: relative;
    }

    .qr-img {
        width: 300px; /* الحجم الكبير المبدئي */
        transition: transform 2s ease-in-out;
        display: block;
        border-radius: 10px;
    }

    /* تعديل النص ليكون دائمًا فوق الباركود ويظهر في سطر واحد */
    .msg-text {
        color: #f26735; /* نفس لون الباركود */
        font-size: 50px;  /* تكبير حجم النص */
        font-weight: 900;
        text-align: center;
        position: absolute;
        top: -100px; /* رفع النص أكثر فوق الباركود */
        left: 50%;
        transform: translateX(-50%); /* لجعل النص في المنتصف */
        width: auto; /* تغيير العرض ليتناسب مع النص فقط */
        white-space: nowrap; /* جعل النص في نفس السطر */
        font-family: 'Cairo', sans-serif; /* الخط المعتمد */
        opacity: 1;

        /* إضافة ستروك (إطار) حول النص باستخدام text-shadow */
        text-shadow: 
            2px 2px 0 #4a1029,  
            -2px -2px 0 #4a1029,  
            2px -2px 0 #4a1029,
            -2px 2px 0 #4a1029; /* ستروك بلون #4a1029 حول النص */
    }

    /* التحريك للأعلى والأسفل */
    @keyframes move-up-and-down {
        0% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0); }
    }
</style>
</head>
<body>

    <!-- بداية الشاشة -->
    <div id="qr-view" class="view active">
        <div class="qr-wrapper">
            <img src="qr.png" class="qr-img" alt="QR Code">
            <h1 class="msg-text">جميع روابط التواصل</h1> <!-- النص المعدل -->
        </div>
    </div>

<script>
    const qrView = document.getElementById('qr-view');
    const qrImg = document.querySelector('.qr-img');

    function toggleViews() {
        // بداية مع الكيو آر كود والنص فقط
        qrView.classList.add('active');

        // تحريك الباركود بشكل مريح للأعلى والأسفل
        qrImg.style.animation = 'move-up-and-down 2s ease-in-out infinite'; // حركة خفيفة للأعلى والأسفل بشكل متكرر
    }

    // تبدأ الدورة فور تحميل الصفحة
    toggleViews();
    setInterval(toggleViews, 1200000); // كل 20 دقيقة لتكرار العملية إذا رغبت بذلك
</script>

</body>
</html>
